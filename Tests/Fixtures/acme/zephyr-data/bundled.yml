openapi: 3.0.3
info:
  title: ACME Zephyr Data
  description: >-
    Synthetic bundled OpenAPI fixture representing the output of a downstream
    Stitcher-style reference resolver.
  version: 2.7.3-rc.0
servers:
  - url: "https://api.example.com/zephyr-data"
paths:
  /activeZorplexFeatures:
    get:
      summary: Get active zorplex features
      operationId: getActiveZorplexFeatures
      responses:
        "200":
          description: Active features found
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - uuid
                    - subAccountId
                    - feature
                  properties:
                    id:
                      type: integer
                      format: int64
                    uuid:
                      type: string
                      format: uuid
                    subAccountId:
                      type: integer
                      format: int64
                    feature:
                      type: string
                      enum:
                        - QUANTUM_FLURBINATION
                        - GRIBBLE_ENHANCEMENT
                        - BLARF_OPTIMIZATION
components:
  schemas:
    ActiveZorplexFeature:
      type: object
      required:
        - id
        - uuid
        - subAccountId
        - feature
        - createdAt
        - createdBy
      properties:
        id:
          type: integer
          format: int64
        uuid:
          type: string
          format: uuid
        subAccountId:
          type: integer
          format: int64
        feature:
          type: string
          enum:
            - QUANTUM_FLURBINATION
            - GRIBBLE_ENHANCEMENT
            - BLARF_OPTIMIZATION
            - FNORD_ACCELERATION
            - QUASAR_MATRIX_V2
        deletedAt:
          type: string
          format: date-time
          nullable: true
